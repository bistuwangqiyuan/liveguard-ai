global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: liveguard-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8080"]

  - job_name: liveguard-notify
    metrics_path: /metrics
    static_configs:
      - targets: ["notify:8081"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
